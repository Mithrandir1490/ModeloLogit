name: SBS Laboratorio - Corrida de Prueba Logit

on:
  workflow_dispatch: 

jobs:
  ejecutar-laboratorio:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar repositorio actual
        uses: actions/checkout@v4 # Actualizado a v4

      - name: 2. Inicializar entorno de Python Oficial
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: 3. Instalar librerías desde requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Ejecutar algoritmo y Triple Filtro Clínico
        run: python extractor_sbs.py

      - name: 5. Guardar y confirmar archivos generados en el repositorio
        run: |
          git config --global user.name "SBS Quant Lab Server"
          git config --global user.email "santiago.benitez.salazar@sbs.center"
          git add logit_data.csv vetados_quality.csv
          git commit -m "Data Update: Resultados del Filtro de Calidad y Probabilidades Logit" || echo "No se detectaron cambios estructurales en los datos."
          git push
